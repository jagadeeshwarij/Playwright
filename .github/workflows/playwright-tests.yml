name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 7 AM EST (12:00 UTC)
    - cron: '0 12 * * *'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright browsers
      run: npx playwright install --with-deps

    - name: Run tests
      id: test
      run: npm test

    - name: Send email report
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: jagadeeshwarij6@gmail.com
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: Playwright Test Report - ${{ job.status }}
        body: |
          Playwright Test Execution Report

          Status: ${{ job.status }}
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run: ${{ github.run_id }}

          Test Results Summary:
          Please check the GitHub Actions logs for detailed test results.

          View full results: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        to: jagadeeshwarij6@gmail.com
        from: ${{ secrets.EMAIL_USERNAME }}

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30